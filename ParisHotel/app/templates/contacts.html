<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Hôtel Étoile Lumière</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <!-- Navigation Bar -->
    <header>
        <nav>
            <ul>
                <li><a href="{{url_for('main.index')}}">Home</a></li>
                <li><a href="{{url_for('main.rooms')}}">Rooms</a></li>
                <li><a href="{{url_for('main.booking')}}">Book Now</a></li>
                <li><a href="{{url_for('main.dining')}}">Dining</a></li>
                <li><a href="{{url_for('main.location')}}">Location</a></li>
                <li><a href="{{url_for('main.contacts')}}">Contact</a></li>
                <li><a href="{{ url_for('main.gallery') }}">Gallery</a></li>
                <li><a href="{{ url_for('main.logout') }}">Logout</a></li>
            </ul>
        </nav>
    </header>

    <section id="form">
        <h2>Contact Us</h2>
        <div class="form-container">
            <form action="{{url_for('main.submit_contact')}}" method="POST">
                
                <div class="form-group">
                    <label for="name" class="form-label required">Full Name</label>
                    <input type="text" id="name" name="name" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label required">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="message" class="form-label required">Your Message</label>
                    <textarea id="message" name="message" class="form-textarea" required></textarea>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="form-button form-button-primary">Send Message</button>
                </div>
                
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Hôtel Étoile Lumière. All rights reserved.</p>
        <p>Follow us on social media: [Facebook] [Instagram]</p>
    </footer>
</body>
</html>
