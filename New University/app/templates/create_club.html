<!DOCTYPE html>
<html>
<head>
    <title>Create Club - New City University</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 400px;
        }

        .form-container h2 {
            margin-bottom: 30px;
            color: #2c7be5;
            text-align: center;
        }

        .form-container input[type="text"],
        .form-container textarea {
            width: 100%;
            padding: 10px 15px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .form-container textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-container button {
            width: 100%;
            padding: 10px;
            background-color: #2c7be5;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .form-container button:hover {
            background-color: #1a5fd1;
        }

        .form-container a {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #2c7be5;
            text-decoration: none;
            font-size: 14px;
        }

        .form-container a:hover {
            text-decoration: underline;
        }

        .flash-message {
            margin-bottom: 15px;
            font-size: 14px;
            padding: 10px;
            border-radius: 5px;
        }

        .danger { 
            background-color: #ffe0e0;
            color: #c0392b;
        }
        .success { 
            background-color: #e0ffe0;
            color: #27ae60;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Create New Club</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-message {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('main.create_club') }}" method="POST">
        <input type="text" name="club_name" placeholder="Club Name" required>
        <textarea name="description" placeholder="Club Description (optional)"></textarea>
        <button type="submit">Create Club</button>
    </form>

    <a href="{{ url_for('main.account') }}">Back to Account</a>
</div>

</body>
</html>
